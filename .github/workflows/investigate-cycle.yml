name: Investigation Agent Cycle

on:
  schedule:
    - cron: '0 14 * * *'    # 2pm UTC daily -- afternoon deep work
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why are you running this manually?'
        required: false

jobs:
  investigate-cycle:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Run investigation cycle
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BMID_AGENT_KEY: ${{ secrets.BMID_AGENT_KEY }}
        run: python scripts/run_cycle.py investigate

      - name: Commit results
        run: |
          git config user.name "Hoffman Investigation Agent"
          git config user.email "investigate-agent@hoffmanlenses.org"
          git add HOFFMAN_INVESTIGATE.md reports/
          git diff --staged --quiet || git commit -m "investigate: auto cycle $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push
