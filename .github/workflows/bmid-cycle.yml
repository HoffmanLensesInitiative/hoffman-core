name: BMID Build Agent

on:
  schedule:
    - cron: '0 11 * * *'    # 11am UTC daily (4am Pacific)
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why are you running this manually?'
        required: false

jobs:
  bmid-cycle:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Run BMID build cycle
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/run_cycle.py bmid

      - name: Commit results
        run: |
          git config user.name "Hoffman BMID Agent"
          git config user.email "build-agent@hoffmanlenses.org"
          git add HOFFMAN_BUILD_BMID.md reports/ bmid-api/
          git diff --staged --quiet || git commit -m "bmid: auto cycle $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push
