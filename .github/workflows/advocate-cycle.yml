name: Advocacy Agent Cycle

on:
  schedule:
    - cron: '0 12 * * 1'    # Mondays at noon UTC -- weekly advocacy review
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why are you running this manually?'
        required: false

jobs:
  advocate-cycle:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Run advocacy cycle
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/run_cycle.py advocate

      - name: Commit results
        run: |
          git config user.name "Hoffman Advocacy Agent"
          git config user.email "advocate-agent@hoffmanlenses.org"
          git add HOFFMAN_ADVOCATE.md reports/
          git diff --staged --quiet || git commit -m "advocate: auto cycle $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git pull --rebase origin main
          git push
