name: Website Build Agent

on:
  schedule:
    - cron: '0 12 * * *'    # 12pm UTC daily (5am Pacific)
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why are you running this manually?'
        required: false

jobs:
  website-cycle:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Run website build cycle
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/run_cycle.py website

      - name: Commit results
        run: |
          git config user.name "Hoffman Website Agent"
          git config user.email "build-agent@hoffmanlenses.org"
          git add HOFFMAN_BUILD_WEBSITE.md reports/
          git diff --staged --quiet || git commit -m "website: auto cycle $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push
