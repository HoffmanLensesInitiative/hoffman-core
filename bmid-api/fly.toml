# Fly.io configuration for BMID API
# Deploy: fly deploy
# First time: fly launch --no-deploy, then fly deploy

app            = "bmid-hoffmanlenses"
primary_region = "iad"

[build]

[env]
  BMID_DATABASE = "/data/bmid.db"

[http_service]
  internal_port       = 8080
  force_https         = true
  auto_stop_machines  = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory   = "512mb"
  cpu_kind = "shared"
  cpus     = 1

# Persistent volume for SQLite database
[[mounts]]
  source      = "bmid_data"
  destination = "/data"
