# fly.toml app configuration file generated for bmid-hoffmanlenses on 2026-04-08T03:46:02-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'bmid-hoffmanlenses'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

[env]
  BMID_DATABASE = '/data/bmid.db'

[[mounts]]
  source      = 'bmid_data'
  destination = '/data'
